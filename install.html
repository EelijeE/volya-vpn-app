<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Установка ВОЛЯ VPN</title>
    <style>
        body { background: #1e1e1e; color: white; font-family: sans-serif; text-align: center; padding: 40px 15px; }
        .btn { display: block; width: 100%; max-width: 320px; margin: 15px auto; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 18px; border: none; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-ios { background: #007aff; color: white; }
        .btn-android { background: #3ddc84; color: black; }
        .btn-copy { background: #444; color: white; }
    </style>
</head>
<body>
    <h2 style="margin-bottom: 10px;">ВОЛЯ VPN</h2>
    <p style="color: #aaa; margin-bottom: 30px;">Выберите ваше устройство для настройки</p>

    <div id="content">
        <a href="#" id="btn-ios" class="btn btn-ios">🍏 Настроить на iPhone</a>
        <a href="#" id="btn-android" class="btn btn-android">🤖 Настроить на Android</a>
        <button id="btn-copy" class="btn btn-copy">📋 Скопировать ссылку</button>
        <p id="copy-status" style="color: #3ddc84; display: none; margin-top: 15px;">✅ Ссылка скопирована!</p>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const config = urlParams.get('config');

            if (config) {
                let redirectUrl = config.startsWith("http") ? "v2box://install-sub?url=" + encodeURIComponent(config) : config;

                // Привязываем ссылки к кнопкам
                document.getElementById('btn-ios').href = redirectUrl;
                document.getElementById('btn-android').href = redirectUrl;

                // Функция копирования (надежная для всех телефонов)
                document.getElementById('btn-copy').onclick = function() {
                    const tempInput = document.createElement("input");
                    tempInput.value = config;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                    
                    document.getElementById('copy-status').style.display = 'block';
                    setTimeout(() => { document.getElementById('copy-status').style.display = 'none'; }, 2000);
                };

                // Авто-запуск ТОЛЬКО для iOS (iPhone, iPad)
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                if (isIOS) {
                    window.location.href = redirectUrl;
                }
            } else {
                document.getElementById('content').innerHTML = "<h3>Ошибка: Ссылка не найдена.</h3>";
            }
        }
    </script>
</body>
</html>
